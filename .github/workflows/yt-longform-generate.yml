name: YT Longform Generate

on:
  workflow_dispatch:
    inputs:
      topic:
        description: Optional topic seed
        required: false
        default: ""
      category:
        description: Category
        required: false
        default: random
      duration:
        description: Duration seconds (min 300)
        required: false
        default: "360"
      scenes:
        description: Scene count
        required: false
        default: "14"
      tts_provider:
        description: openai or elevenlabs
        required: false
        default: elevenlabs
      tts_voice:
        description: TTS voice
        required: false
        default: wUrGnU2Kx934kbDdOWDo
      image_quality:
        description: low, medium, high
        required: false
        default: low
      format_type:
        description: Format video type (dokumenter_klasik, investigasi_misteri, timeline_evolutif, mitos_vs_fakta, kisah_manusia, countdown, debat_dua_sisi, fenomena_alam, perbandingan, eksperimen_berpikir)
        required: false
        default: ""
      force:
        description: Bypass daily generate limit
        required: false
        default: "false"
  schedule:
    # 09:15 WIB / Asia-Bangkok (UTC+7). GitHub cron pakai UTC.
    - cron: "15 2 * * *"

concurrency:
  group: yt-longform-generate
  cancel-in-progress: false

permissions:
  actions: read
  contents: read

jobs:
  generate:
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    env:
      PUBLIC_BASE_URL: ${{ secrets.PUBLIC_BASE_URL }}
      AUTO_DASHBOARD_PIN: ${{ secrets.AUTO_DASHBOARD_PIN || '123456' }}
      UPLOAD_DRIVER: ${{ secrets.UPLOAD_DRIVER || 'sftp' }}
      SFTP_HOST: ${{ secrets.SFTP_HOST }}
      SFTP_PORT: ${{ secrets.SFTP_PORT || '65002' }}
      SFTP_USER: ${{ secrets.SFTP_USER }}
      SFTP_PASSWORD: ${{ secrets.SFTP_PASSWORD }}
      SFTP_PRIVATE_KEY: ${{ secrets.SFTP_PRIVATE_KEY }}
      SFTP_REMOTE_DIR: ${{ secrets.SFTP_REMOTE_DIR }}
      SFTP_UPLOAD_TIMEOUT_SECONDS: ${{ secrets.SFTP_UPLOAD_TIMEOUT_SECONDS || '300' }}
      FTP_HOST: ${{ secrets.FTP_HOST }}
      FTP_PORT: ${{ secrets.FTP_PORT || '21' }}
      FTP_USER: ${{ secrets.FTP_USER }}
      FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
      FTP_REMOTE_DIR: ${{ secrets.FTP_REMOTE_DIR }}

      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL || 'https://api.openai.com/v1' }}
      STORY_MODEL: ${{ secrets.STORY_MODEL || 'gpt-4.1-mini' }}
      IMAGE_MODEL: ${{ secrets.IMAGE_MODEL || 'gpt-image-1-mini' }}
      IMAGE_SIZE: ${{ secrets.IMAGE_SIZE || '1536x1024' }}
      IMAGE_QUALITY: ${{ github.event.inputs.image_quality || secrets.IMAGE_QUALITY || 'low' }}
      OPENAI_TTS_MODEL: ${{ secrets.OPENAI_TTS_MODEL || 'gpt-4o-mini-tts' }}
      OPENAI_TTS_VOICE: ${{ github.event.inputs.tts_voice || secrets.OPENAI_TTS_VOICE || 'cedar' }}
      OPENAI_TRANSCRIBE_MODEL: ${{ secrets.OPENAI_TRANSCRIBE_MODEL || 'whisper-1' }}
      ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
      ELEVENLABS_MODEL: ${{ secrets.ELEVENLABS_MODEL || 'eleven_multilingual_v2' }}
      ELEVENLABS_VOICE_ID: ${{ secrets.ELEVENLABS_VOICE_ID || 'wUrGnU2Kx934kbDdOWDo' }}
      ELEVENLABS_SPEED: ${{ secrets.ELEVENLABS_SPEED || '1.08' }}

      SPEECH_TEMPO: ${{ secrets.SPEECH_TEMPO || '1.0' }}
      RENDER_TITLE_FONT: Bebas Neue
      RENDER_BODY_FONT: Noto Sans
      RENDER_MONO_FONT: JetBrains Mono
      YT_TTS_PROVIDER: ${{ secrets.YT_TTS_PROVIDER || 'elevenlabs' }}
      YT_TTS_VOICE: ${{ secrets.YT_TTS_VOICE || secrets.ELEVENLABS_VOICE_ID || 'wUrGnU2Kx934kbDdOWDo' }}
      YT_TIME_ZONE: ${{ secrets.YT_TIME_ZONE || 'Asia/Bangkok' }}
      YT_DAILY_GENERATE_LIMIT: ${{ secrets.YT_DAILY_GENERATE_LIMIT || '1' }}
      YT_DURATION_SEC: ${{ github.event.inputs.duration || secrets.YT_DURATION_SEC || '360' }}
      YT_SCENE_COUNT: ${{ github.event.inputs.scenes || secrets.YT_SCENE_COUNT || '14' }}
      YT_WORKFLOW_FILE: yt-longform-generate.yml
      YT_FORMAT_TYPE: ${{ github.event.inputs.format_type || secrets.YT_FORMAT_TYPE || '' }}
      YT_STRICT_REMOTE: ${{ secrets.YT_STRICT_REMOTE || 'false' }}
      GITHUB_TOKEN: ${{ github.token }}

      YOUTUBE_UPLOAD_ENABLED: ${{ secrets.YOUTUBE_UPLOAD_ENABLED || 'true' }}
      YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
      YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
      YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
      YOUTUBE_PRIVACY_STATUS: ${{ secrets.YOUTUBE_PRIVACY_STATUS || 'public' }}
      YOUTUBE_CATEGORY_ID: ${{ secrets.YOUTUBE_CATEGORY_ID || '27' }}
      YOUTUBE_TAGS: ${{ secrets.YOUTUBE_TAGS || 'BanyakTau,Edukasi,Pengetahuan,Sains,Sejarah,Teknologi' }}
      THUMBNAIL_GENERATION_ENABLED: ${{ secrets.THUMBNAIL_GENERATION_ENABLED || 'false' }}
      YOUTUBE_CUSTOM_THUMBNAIL_ENABLED: ${{ secrets.YOUTUBE_CUSTOM_THUMBNAIL_ENABLED || 'true' }}
      YOUTUBE_THUMBNAIL_UPLOAD_ATTEMPTS: ${{ secrets.YOUTUBE_THUMBNAIL_UPLOAD_ATTEMPTS || '1' }}
      YOUTUBE_DAILY_UPLOAD_LIMIT: ${{ secrets.YOUTUBE_DAILY_UPLOAD_LIMIT || '2' }}
      YOUTUBE_PLAYLISTS: ${{ secrets.YOUTUBE_PLAYLISTS || '' }}
      YOUTUBE_DEFAULT_PLAYLIST_ID: ${{ secrets.YOUTUBE_DEFAULT_PLAYLIST_ID || '' }}

      PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
      PEXELS_OVERLAY_ENABLED: ${{ secrets.PEXELS_OVERLAY_ENABLED || 'true' }}
      PEXELS_OVERLAY_OPACITY: ${{ secrets.PEXELS_OVERLAY_OPACITY || '0.55' }}
      PEXELS_BLACK_KEY_SIMILARITY: ${{ secrets.PEXELS_BLACK_KEY_SIMILARITY || '0.16' }}
      PEXELS_BLACK_KEY_BLEND: ${{ secrets.PEXELS_BLACK_KEY_BLEND || '0.08' }}

      YOUTUBE_DATA_API_KEY: ${{ secrets.YOUTUBE_DATA_API_KEY }}
      YOUTUBE_TRENDING_ENABLED: ${{ secrets.YOUTUBE_TRENDING_ENABLED || 'true' }}
      YOUTUBE_TRENDING_REGION: ${{ secrets.YOUTUBE_TRENDING_REGION || 'ID' }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Restore topic history
        uses: actions/cache/restore@v4
        with:
          path: |
            data/items.json
            data/memory.json
          key: yt-longform-history-${{ github.run_id }}
          restore-keys: |
            yt-longform-history-

      - name: Check FFmpeg
        id: ffmpeg
        shell: bash
        run: |
          if command -v ffmpeg >/dev/null 2>&1 && command -v ffprobe >/dev/null 2>&1; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
            ffmpeg -version | head -n 1
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install FFmpeg
        if: steps.ffmpeg.outputs.ready != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ffmpeg

      - name: Install dependencies
        run: npm ci --no-audit --fund=false

      - name: Validate source
        run: npm run check

      - name: Preflight
        run: npm run preflight

      - name: Generate longform video
        env:
          # Input user dilewatkan sebagai ENV (data), bukan diinterpolasi ke shell source.
          # Mencegah script injection: nilai "$VAR" ber-quote tidak pernah dieksekusi sebagai perintah.
          INPUT_TOPIC: ${{ github.event.inputs.topic }}
          INPUT_CATEGORY: ${{ github.event.inputs.category }}
          INPUT_DURATION: ${{ github.event.inputs.duration }}
          INPUT_SCENES: ${{ github.event.inputs.scenes }}
          INPUT_TTS_PROVIDER: ${{ github.event.inputs.tts_provider }}
          INPUT_TTS_VOICE: ${{ github.event.inputs.tts_voice }}
          INPUT_IMAGE_QUALITY: ${{ github.event.inputs.image_quality }}
          INPUT_FORMAT_TYPE: ${{ github.event.inputs.format_type }}
          INPUT_FORCE: ${{ github.event.inputs.force }}
        run: |
          npm run run:once -- \
            --topic "$INPUT_TOPIC" \
            --category "$INPUT_CATEGORY" \
            --duration "$INPUT_DURATION" \
            --scenes "$INPUT_SCENES" \
            --tts-provider "$INPUT_TTS_PROVIDER" \
            --tts-voice "$INPUT_TTS_VOICE" \
            --image-quality "$INPUT_IMAGE_QUALITY" \
            --format-type "$INPUT_FORMAT_TYPE" \
            --force "$INPUT_FORCE"

      - name: Save topic history
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            data/items.json
            data/memory.json
          key: yt-longform-history-${{ github.run_id }}
